name: Publishing on CurseForge
on:
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to (re)publish (leave empty for latest)
        required: false
  release:
    types: [released]

concurrency:
  group: cf-publish-${{ github.event.release.tag_name || inputs.tag || 'latest' }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  cf-publish:
    if: github.event_name == 'release' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-22.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: 📃 Prepare release
        id: prepare
        uses: ./.github/actions/prepare-release
        with:
          tag: ${{ inputs.tag || github.event.release.tag_name }}

      - name: 📋 Generate HTML changelog
        run: npx tsx .github/scripts/curseforge-md-to-html.ts latest_release.md

      - name: 📤 Upload changelog artifact
        uses: actions/upload-artifact@v4
        with:
          name: changelog-html-${{ steps.prepare.outputs.tag_name }}
          path: latest_release.html

      - name: 🅱 Determine release type
        id: meta
        env:
          TAG: ${{ steps.prepare.outputs.tag_name }}
        run: |
          if   [[ "$TAG" == *"-beta"*  ]]; then echo "release_type=beta"    >> "$GITHUB_OUTPUT"
          elif [[ "$TAG" == *"-alpha"* ]]; then echo "release_type=alpha"   >> "$GITHUB_OUTPUT"
          else                                   echo "release_type=release" >> "$GITHUB_OUTPUT"
          fi

      - name: 💽 Download .zip files from release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.prepare.outputs.tag_name }}
        run: gh release download "$TAG" --pattern "*.zip"

      - name: 📋 Read HTML changelog
        id: html
        uses: andstor/file-reader-action@v1
        with:
          path: latest_release.html

      - name: 💻 Upload Client
        uses: itsmeow/curseforge-upload@v3
        id: client
        with:
          release_type: ${{ steps.meta.outputs.release_type }}
          display_name: E2E-Extended-${{ steps.prepare.outputs.tag_name }}
          file_path: E2E-Extended-${{ steps.prepare.outputs.tag_name }}.zip
          game_endpoint: minecraft
          game_versions: 'Minecraft 1.12:1.12.2'
          project_id: '561105'
          token: ${{ secrets.CURSEFORGE_API_TOKEN }}
          changelog_type: html
          changelog: ${{ steps.html.outputs.contents }}

      - name: 🖥️ Upload Server
        uses: itsmeow/curseforge-upload@v3
        with:
          release_type: ${{ steps.meta.outputs.release_type }}
          display_name: E2E-Extended-${{ steps.prepare.outputs.tag_name }}-server
          file_path: E2E-Extended-${{ steps.prepare.outputs.tag_name }}-server.zip
          game_endpoint: minecraft
          project_id: '561105'
          parent_file_id: ${{ steps.client.outputs.id }}
          token: ${{ secrets.CURSEFORGE_API_TOKEN }}
