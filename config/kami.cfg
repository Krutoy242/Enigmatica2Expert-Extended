        # The forward momentum speed bonus granted when jumping while wearing the Ichorweave Boots of the Biosphere.
        D:"Awakened Boots: Jump Factor"=0.03

        # The movement speed bonus granted when wearing the Ichorweave Boots of the Biosphere.
        D:"Awakened Boots: Movement Bonus"=0.08

